<script>
document.addEventListener("DOMContentLoaded", function () {
  document.querySelectorAll(".series-row").forEach(row => {
    const text = row.querySelector(".series-text");
    if (!text) return;

    function updateFade() {
      if (text.scrollWidth > text.clientWidth &&
          text.scrollLeft + text.clientWidth < text.scrollWidth - 1) {
        row.classList.add("has-overflow");
      } else {
        row.classList.remove("has-overflow");
      }
    }

    updateFade();
    window.addEventListener("resize", updateFade);
    text.addEventListener("scroll", updateFade);
  });
});
</script>

<div class="series-card">
  <div class="series-header">Blog Series</div>

  <div class="series-group">
    {% assign sorted_series = site.posts | group_by: 'series' %}
    {% for sorted in sorted_series %}
      {% assign pages_list = sorted.items %}
      {% for post in pages_list reversed %}
        {% if post.series == include.id %}
          <a href="{{ post.url }}" class="series-row">
			  <span class="series-text">
				{{ post.title }}
			  </span>
			</a>
        {% endif %}
      {% endfor %}
    {% endfor %}
  </div>
</div>
