{% if page.url and page.url != "/" and page.sitemap != false and page.title %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ site.site_url }}/"
    }
    {% if page.url contains '/blog/' and page.url != '/blog/' %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "Blog",
      "item": "{{ site.site_url }}/blog/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": {{ page.title | jsonify }},
      "item": "{{ site.site_url }}{{ page.url | remove: 'index.html' }}"
    }
    {% else %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": {{ page.title | jsonify }},
      "item": "{{ site.site_url }}{{ page.url | remove: 'index.html' }}"
    }
    {% endif %}
  ]
}
</script>
{% endif %}
