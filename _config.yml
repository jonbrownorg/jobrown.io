# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you: 
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

author:
  name: Jon Brown
  url: https://jonbrown.org
  avatar: /assets/images/about/jon-brown.jpg
  same_as:
    - https://youtube.com/@managingmacs
    - https://www.linkedin.com/in/jonbrown
    - https://github.com/jonbrown21
    
organization:
  name: Managing Macs
  url: https://jonbrown.org
  logo: /assets/images/main/logo.png

seo:
  type: Person
    
twitter:
  card: summary_large_image
  
webmaster_verifications:
  google: jt5j7dVxAu3uA_2KN9iXdYvClew5_Iga_eB7pgXCAyI
    
title: "Jon Brown | Apple Ecosystem Strategist & Technology Consultant"
tagline: "Building secure, scalable Apple environments for modern teams"
description: "Jon Brown is a technology consultant focused on Apple device management, enterprise security, and macOS strategy. Founder of Managing Macs, he helps organizations deploy and manage Apple at scale."

logo: "/assets/images/main/logo.png"
locale: "en_US"
email: jon@jonbrown.org

paginate: 6
paginate_path: /blog/page/:num
permalink: /blog/:categories/:year/:month/:day/:title.html

lang: en_US

mailchimp-list: https://assets.mailerlite.com/jsonp/1303120/forms/144842435086780321/subscribe
github_username:  jonbrown21

feed:
  path: atom.xml
  
compress_images:
  images_path: "assets/images/**/*.{gif,png,jpg,jpeg,svg}"
  
imageoptim:
  # Disabling svgo because it throws some error
  pngout: true
  svgo: false
  jpegrecompress:
    allow_lossy: true
    quality: 2
    max_quality: 80 
  verbose: true

site_url:           http://localhost:4000
base_href:          http://localhost:4000
site_cdn:           http://localhost:4000

#url:                https://jonbrown.org
#site_url:           https://jonbrown.org
#base_href:          https://jonbrown.org
#site_cdn:           https://jonbrown.org

production:          true

homepage:
  youtube:
    title: "My CISSP Experience"
    description: "How I Conquered the CISSP Exam: 9 Months, Top Resources, and Proven Strategies"
    youtube_id: TXL3h4DZ414
    published: 2025-01-28

# Build settings
theme: null
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-compress-images

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - AGENTS.md
  - Rakefile
  - docker-compose.yml
  - .codex-backups
  - .DS_Store
